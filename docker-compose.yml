services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: costaatt_admissions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d costaatt_admissions"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      AUTH_MODE: development
      NEXT_PUBLIC_AUTH_MODE: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/costaatt_admissions
      APP_STORAGE_DIR: /app/storage
      SOFFICE_PATH: /usr/bin/libreoffice
    ports:
      - "3000:3000"
    volumes:
      - app-storage:/app/storage

volumes:
  postgres-data:
  app-storage:
