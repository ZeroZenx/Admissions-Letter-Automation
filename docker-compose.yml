services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: costaatt_admissions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d costaatt_admissions"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_AUTH_MODE: development
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      AUTH_MODE: development
      NEXT_PUBLIC_AUTH_MODE: development
      ALLOW_INSECURE_DEVELOPMENT_AUTH: "true"
      DATABASE_URL: postgres://postgres:postgres@db:5432/costaatt_admissions
      APP_STORAGE_DIR: /app/storage
      SOFFICE_PATH: /usr/bin/libreoffice
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
    ports:
      - "6001:6001"
    volumes:
      - app-storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:6001/api/health').then(async (response) => { const body = await response.json(); process.exit(response.ok && body.ok ? 0 : 1); }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  app-storage:
