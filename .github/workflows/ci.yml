name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: costaatt_admissions
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d costaatt_admissions"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AUTH_MODE: development
      NEXT_PUBLIC_AUTH_MODE: development
      ALLOW_INSECURE_DEVELOPMENT_AUTH: "true"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/costaatt_admissions
      APP_STORAGE_DIR: ./storage
      SOFFICE_PATH: /usr/bin/libreoffice
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install LibreOffice
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Setup database
        run: npm run db:setup

      - name: Build
        run: npm run build

      - name: Start app
        run: npm run start > /tmp/admissions-app.log 2>&1 &

      - name: Smoke test
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:6001/api/health > /tmp/health.json; then
              break
            fi
            sleep 2
          done
          npm run smoke

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build Docker image
        run: docker build --tag costaatt-admissions-letter-automation:ci .
